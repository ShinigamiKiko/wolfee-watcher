{{- if .Values.sensor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: sensor
spec:
  replicas: {{ .Values.sensor.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sensor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sensor
    spec:
      serviceAccountName: sensor
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: sensor
          image: "{{ include "kvisior.image" .Values.sensor.image }}"
          imagePullPolicy: {{ .Values.sensor.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: api
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: CERT_SERVER_ADDR
              value: {{ .Values.global.certServerAddr | quote }}
            - name: MTLS_REQUIRED
              value: {{ .Values.global.mtlsRequired | quote }}
            - name: KVISIOR_URL
              value: "http://kvisior-ui.{{ include "kvisior.namespace" . }}.svc.cluster.local:80"
            - name: INTERNAL_PUSH_SECRET
              value: {{ .Values.global.internalPushSecret | quote }}
            - name: SENSOR_ROLE
              value: {{ .Values.sensor.role | quote }}
            - name: SENSOR_LEASE_NAME
              value: {{ .Values.sensor.leaseName | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
          resources:
            {{- toYaml .Values.sensor.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: sensor
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: sensor
spec:
  selector:
    app.kubernetes.io/name: sensor
  ports:
    - name: api
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: health
      port: 8081
      targetPort: 8081
      protocol: TCP
{{- end }}
