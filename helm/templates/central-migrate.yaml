{{- if .Values.centralMigrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: central-migrate
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: central-migrate
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: central-migrate
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: migrate
          image: "{{ include "kvisior.image" .Values.centralMigrate.image }}"
          imagePullPolicy: {{ .Values.centralMigrate.image.pullPolicy }}
          env:
            - name: POSTGRES_DSN
              value: {{ .Values.global.postgresDSN | quote }}
            - name: EXPECTED_SCHEMA_VERSION
              value: {{ .Values.centralMigrate.schemaVersion | quote }}
            {{- with .Values.centralMigrate.adminBootstrapPassword }}
            - name: ADMIN_BOOTSTRAP_PASSWORD
              value: {{ . | quote }}
            {{- end }}
            - name: SERVICE_DB_PASSWORD_UI
              value: {{ .Values.postgres.serviceCredentials.ui.password | quote }}
            - name: SERVICE_DB_PASSWORD_TRACEE_BRIDGE
              value: {{ .Values.postgres.serviceCredentials.traceeBridge.password | quote }}
            - name: SERVICE_DB_PASSWORD_ANOMALY
              value: {{ .Values.postgres.serviceCredentials.anomaly.password | quote }}
          resources:
            {{- toYaml .Values.centralMigrate.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
{{- end }}
