{{- if .Values.scannerAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-agent
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: scanner-agent
spec:
  replicas: {{ .Values.scannerAgent.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: scanner-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scanner-agent
    spec:
      serviceAccountName: scanner-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      {{- with .Values.scannerAgent.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scanner-agent
          image: "{{ include "kvisior.image" .Values.scannerAgent.image }}"
          imagePullPolicy: {{ .Values.scannerAgent.image.pullPolicy }}
          ports:
            - containerPort: 9090
              name: https
              protocol: TCP
          env:
            - name: SCANNER_ADDR
              value: ":9090"
            - name: GRYPE_DB_CACHE_DIR
              value: "/grype-cache"
            - name: XDG_CACHE_HOME
              value: "/grype-cache"
            - name: HOME
              value: "/grype-cache"
            - name: GRYPE_SKIP_DB_UPDATE
              value: "true"
            - name: GRYPE_DB_AUTO_UPDATE
              value: "false"
            - name: GRYPE_DB_VALIDATE_AGE
              value: "false"
            - name: GRYPE_DB_REQUIRE_UPDATE_CHECK
              value: "false"
            - name: GRYPE_DB_MAX_ALLOWED_BUILT_AGE
              value: "8760h"
            - name: GRYPE_CHECK_FOR_APP_UPDATE
              value: "false"
            - name: CERT_SERVER_ADDR
              value: {{ .Values.global.certServerAddr | quote }}
            - name: MTLS_REQUIRED
              value: {{ .Values.global.mtlsRequired | quote }}
            - name: KVISIOR_URL
              value: "http://kvisior-ui.{{ include "kvisior.namespace" . }}.svc.cluster.local:80"
            - name: INTERNAL_PUSH_SECRET
              value: {{ .Values.global.internalPushSecret | quote }}
            - name: SCAN_WORKSPACE_DIR
              value: "/scan-workspace"
            {{- if .Values.scannerAgent.bdu.enabled }}
            {{- if .Values.scannerAgent.bdu.archiveURL }}
            - name: BDU_ARCHIVE_URL
              value: {{ .Values.scannerAgent.bdu.archiveURL | quote }}
            {{- end }}
            {{- else }}
            - name: BDU_DISABLE
              value: "1"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.scannerAgent.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: scanner-agent
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: scanner-agent
spec:
  selector:
    app.kubernetes.io/name: scanner-agent
  ports:
    - name: https
      port: 9090
      targetPort: 9090
      protocol: TCP
{{- end }}
