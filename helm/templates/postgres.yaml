{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 999
      initContainers:
        - name: fix-socket-dir
          image: busybox:1.36
          command: ["sh", "-c", "chmod 1777 /var/run/postgresql"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: socket-dir
              mountPath: /var/run/postgresql
      containers:
        - name: postgres
          image: "{{ include "kvisior.image" .Values.postgres.image }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
                command: ["pg_ctl", "stop", "-m", "fast", "-D", "/var/lib/postgresql/data/pgdata"]
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: socket-dir
              mountPath: /var/run/postgresql
      volumes:
        - name: socket-dir
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "kvisior.labels" . | nindent 10 }}
          app.kubernetes.io/name: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size | quote }}
        {{- if .Values.postgres.storage.storageClass }}
        storageClassName: {{ .Values.postgres.storage.storageClass | quote }}
        {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ .Values.postgres.password | quote }}
{{- end }}
