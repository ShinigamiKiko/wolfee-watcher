{{- if .Values.tracee.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tracee
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-tracee
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-tracee
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-tracee
subjects:
  - kind: ServiceAccount
    name: tracee
    namespace: {{ include "kvisior.namespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tracee-policy
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
data:
  wolfee-watcher.yaml: |
    apiVersion: tracee.aquasec.com/v1beta1
    kind: Policy
    metadata:
      name: wolfee-watcher
      annotations:
        description: Wolfee-Watcher security policy
    spec:
      scope:
        - container
      defaultActions:
        - log
      rules:
        - event: execve
        - event: execveat
        # Internal kernel event-tracepoints (authored on the Tracepoints tab) —
        # a separate event family from the syscalls above/below. sched_switch
        # is deliberately NOT collected by default (fires on every context
        # switch); enable it via a scoped policy from the Tracepoints tab.
        - event: sched_process_exec
        - event: sched_process_fork
        - event: sched_process_exit
        - event: task_rename
        - event: cgroup_mkdir
        - event: cgroup_rmdir
        - event: cgroup_attach_task
        # process syscalls
        - event: clone
        - event: kill
        - event: chdir
        - event: openat2
        - event: ptrace
        - event: process_vm_writev
        - event: memfd_create
        - event: bpf
        - event: io_uring_setup
        - event: io_uring_enter
        - event: io_uring_register
        - event: socket
          filters:
            - args.domain=2
            - args.domain=10
            - args.domain=17
        - event: mmap
          filters:
            - args.prot=6
            - args.prot=7
        - event: mprotect
          filters:
            - args.prot=6
            - args.prot=7
        - event: init_module
        - event: finit_module
        # module-subsystem tracepoints — module_load fires once the module is
        # actually inserted, regardless of which syscall path loaded it;
        # module_free catches a rootkit unloading itself
        - event: module_load
        - event: module_free
        - event: pivot_root
        - event: unshare
        - event: setns
        - event: chroot
        - event: mount
        - event: umount2
        - event: security_sb_mount
        - event: setuid
        - event: setgid
        - event: setreuid
        - event: setresuid
        - event: setresgid
        - event: capset
        - event: openat
          filters:
            - args.pathname=/etc/passwd
            - args.pathname=/etc/shadow
            - args.pathname=/etc/sudoers
            - args.pathname=/etc/crontab
            - args.pathname=/var/run/secrets/*
            - args.pathname=/run/secrets/*
            - args.pathname=/root/*
            - args.pathname=/.ssh/*
        - event: open
          filters:
            - args.pathname=/etc/passwd
            - args.pathname=/etc/shadow
            - args.pathname=/etc/sudoers
            - args.pathname=/etc/crontab
            - args.pathname=/var/run/secrets/*
            - args.pathname=/run/secrets/*
            - args.pathname=/root/*
            - args.pathname=/.ssh/*
        - event: connect
        - event: bind
        - event: accept
        - event: accept4
        - event: dup2
          filters:
            - args.newfd=0
            - args.newfd=1
            - args.newfd=2
        - event: dup3
          filters:
            - args.newfd=0
            - args.newfd=1
            - args.newfd=2
        # ── LSM security hooks (kernel point-of-use; authored on the LSM Hooks tab) ──
        # LSM hooks fire INSIDE the kernel on resolved objects (dentry/inode,
        # kernel-copied sockaddr, the binprm file actually loaded), so they catch
        # io_uring / direct-VFS bypass and TOCTOU argument swaps that a syscall
        # tracepoint at entry would miss.
        #
        # security_file_open keeps the sensitive container-path filter as a safe
        # default; the rest are emitted unfiltered. Operators narrow any hook by
        # path / argument in the kvisior LSM Hooks builder, which generates the
        # filter lines to merge back here (kernel-side, eBPF-level filtering).
        # security_sb_mount is already declared above (Container Escape block).
        #
        # NOTE: kprobe (magic_write, commit_creds, …) and uprobe anti-rootkit
        # scans (hooked_syscall, …) were intentionally removed — overhead/noise
        # without a standalone, operator-actionable signal.
        - event: security_file_open
          filters:
            - args.pathname=/etc/passwd
            - args.pathname=/etc/shadow
            - args.pathname=/etc/sudoers
            - args.pathname=/etc/crontab
            - args.pathname=/var/run/secrets/*
            - args.pathname=/run/secrets/*
            - args.pathname=/root/*
            - args.pathname=/.ssh/*
        - event: security_inode_unlink
        - event: security_inode_rename
        - event: security_inode_symlink
        - event: security_inode_mknod
        - event: security_bprm_check
        - event: security_mmap_file
        - event: security_file_mprotect
        - event: security_socket_create
        - event: security_socket_connect
        - event: security_socket_bind
        - event: security_socket_accept
        - event: security_socket_listen
        - event: security_socket_setsockopt
        - event: security_bpf
        - event: security_bpf_map
        - event: security_kernel_read_file
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tracee
  namespace: {{ include "kvisior.namespace" . }}
  labels:
    {{- include "kvisior.labels" . | nindent 4 }}
    app.kubernetes.io/name: tracee
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tracee
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tracee
    spec:
      serviceAccountName: tracee
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: tracee
          image: "{{ include "kvisior.image" .Values.tracee.image }}"
          imagePullPolicy: {{ .Values.tracee.image.pullPolicy }}
          securityContext:
            privileged: true
          args:
            - --output=webhook:http://tracee-bridge.{{ include "kvisior.namespace" . }}.svc.cluster.local:8080/tracee/event?node=$(NODE_NAME)
            - --perf-buffer-size={{ .Values.tracee.perfBufferSize }}
            - --server=http-address=:3366
            - --server=metrics
            - --policy=/policies/wolfee-watcher.yaml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LIBBPFGO_OSRELEASE_FILE
              value: /etc/os-release-host
          ports:
            - name: metrics
              containerPort: 3366
              protocol: TCP
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
            - name: tmp-tracee
              mountPath: /tmp/tracee
            - name: etc-os-release
              mountPath: /etc/os-release-host
              readOnly: true
            - name: boot
              mountPath: /boot
              readOnly: true
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: usr-src
              mountPath: /usr/src
              readOnly: true
            - name: sys-kernel
              mountPath: /sys/kernel
              readOnly: true
          resources:
            {{- toYaml .Values.tracee.resources | nindent 12 }}
      volumes:
        - name: policies
          configMap:
            name: tracee-policy
        - name: tmp-tracee
          emptyDir: {}
        - name: etc-os-release
          hostPath:
            path: /etc/os-release
        - name: boot
          hostPath:
            path: /boot
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: usr-src
          hostPath:
            path: /usr/src
        - name: sys-kernel
          hostPath:
            path: /sys/kernel
            type: DirectoryOrCreate
{{- end }}
